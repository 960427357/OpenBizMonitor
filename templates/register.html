<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 网吧监控系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: { extend: { colors: { primary: { 500: '#6366f1', 600: '#4f46e5' }}}}
    }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">网吧监控系统</h1>
            <p class="text-gray-500 mt-2">创建新账号</p>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg"></div>
            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" id="username" required minlength="2" maxlength="20"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" required minlength="6"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                    <input type="password" id="password2" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">邀请码</label>
                    <input type="text" id="inviteCode"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none"
                        placeholder="首个用户无需填写">
                </div>
                <button type="submit" id="submitBtn"
                    class="w-full py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors">
                    注册
                </button>
            </form>
            <div class="mt-4 text-center text-sm text-gray-500">
                已有账号？<a href="/login" class="text-primary-600 hover:underline">登录</a>
            </div>
        </div>
    </div>
    <script>
    function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const errDiv = document.getElementById('errorMsg');
        const pw = document.getElementById('password').value;
        const pw2 = document.getElementById('password2').value;

        if (pw !== pw2) {
            errDiv.textContent = '两次密码不一致';
            errDiv.classList.remove('hidden');
            return false;
        }

        btn.disabled = true;
        btn.textContent = '注册中...';
        errDiv.classList.add('hidden');

        fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: pw,
                invite_code: document.getElementById('inviteCode').value
            })
        }).then(r => r.json()).then(data => {
            if (data.success) {
                window.location.href = '/login';
            } else {
                errDiv.textContent = data.error || '注册失败';
                errDiv.classList.remove('hidden');
            }
        }).catch(err => {
            errDiv.textContent = '网络错误';
            errDiv.classList.remove('hidden');
        }).finally(() => {
            btn.disabled = false;
            btn.textContent = '注册';
        });
    }
    </script>
</body>
</html>
