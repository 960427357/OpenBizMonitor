<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 网吧监控系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: { extend: { colors: { primary: { 500: '#6366f1', 600: '#4f46e5' }}}}
    }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">网吧监控系统</h1>
            <p class="text-gray-500 mt-2">登录您的账号</p>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg"></div>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" id="username" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                </div>
                <button type="submit" id="submitBtn"
                    class="w-full py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors">
                    登录
                </button>
            </form>
            <div class="mt-4 text-center text-sm text-gray-500">
                还没有账号？<a href="/register" class="text-primary-600 hover:underline">注册</a>
            </div>
        </div>
    </div>
    <script>
    function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const errDiv = document.getElementById('errorMsg');
        btn.disabled = true;
        btn.textContent = '登录中...';
        errDiv.classList.add('hidden');

        fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        }).then(r => r.json()).then(data => {
            if (data.success) {
                window.location.href = '/';
            } else {
                errDiv.textContent = data.error || '登录失败';
                errDiv.classList.remove('hidden');
            }
        }).catch(err => {
            errDiv.textContent = '网络错误';
            errDiv.classList.remove('hidden');
        }).finally(() => {
            btn.disabled = false;
            btn.textContent = '登录';
        });
    }
    </script>
</body>
</html>
